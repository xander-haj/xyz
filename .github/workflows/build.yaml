name: Build

on:
  push:
    tags:
    - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-unix:
    name: on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: Linux
          platform: linux
          os: ubuntu-latest
          archive: Z3R-linux-x64.tar.gz
        - name: Mac Intel
          platform: macos
          os: macos-15-intel
          archive: Z3R-macos-intel.tar.gz
        - name: Mac Apple Silicon
          platform: macos
          os: macos-15
          archive: Z3R-macos-apple-silicon.tar.gz
    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies for Linux
      if: ${{ matrix.platform == 'linux' }}
      run: |
        sudo apt update
        sudo apt install -y libsdl2-dev
    - name: Install dependencies for Mac
      if: ${{ matrix.platform == 'macos' }}
      run: |
        brew install sdl2
    - name: Build
      run: make -j$(getconf _NPROCESSORS_ONLN) zelda3
    - name: Package ${{ matrix.name }} build
      run: |
        mkdir -p "dist/Z3R-${{ matrix.name }}"
        cp zelda3 zelda3.ini readme.md LICENSE.txt "dist/Z3R-${{ matrix.name }}/"
        tar -czf "dist/${{ matrix.archive }}" -C "dist/Z3R-${{ matrix.name }}" .
    - name: Build Linux AppImage
      if: ${{ matrix.platform == 'linux' }}
      env:
        LINUXDEPLOY_URL: https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/linuxdeploy-x86_64.AppImage
        APPIMAGETOOL_URL: https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
      run: |
        sudo apt install -y wget
        mkdir -p AppDir/usr/bin AppDir/usr/share/Z3R AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/scalable/apps dist
        cc packaging/appimage/missing_assets_dialog.c $(sdl2-config --cflags --libs) -o z3r-missing-assets-dialog
        install -Dm755 zelda3 AppDir/usr/bin/zelda3.real
        install -Dm755 z3r-missing-assets-dialog AppDir/usr/bin/z3r-missing-assets-dialog
        install -Dm644 zelda3.ini AppDir/usr/share/Z3R/zelda3.ini
        install -Dm644 packaging/appimage/io.github.xander_haj.Z3R.linuxdeploy.desktop AppDir/io.github.xander_haj.Z3R.desktop
        install -Dm644 packaging/flatpak/io.github.xander_haj.Z3R.svg AppDir/usr/share/icons/hicolor/scalable/apps/io.github.xander_haj.Z3R.svg
        install -Dm644 packaging/flatpak/io.github.xander_haj.Z3R.svg AppDir/io.github.xander_haj.Z3R.svg

        wget -q "${LINUXDEPLOY_URL}" -O linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        ./linuxdeploy-x86_64.AppImage --appimage-extract
        mv squashfs-root linuxdeploy-root
        ./linuxdeploy-root/AppRun \
          --appdir AppDir \
          --executable AppDir/usr/bin/zelda3.real \
          --executable AppDir/usr/bin/z3r-missing-assets-dialog \
          --desktop-file AppDir/io.github.xander_haj.Z3R.desktop \
          --icon-file AppDir/io.github.xander_haj.Z3R.svg

        install -Dm755 packaging/appimage/AppRun AppDir/AppRun
        ln -sf ../../AppRun AppDir/usr/bin/z3r
        install -Dm644 packaging/appimage/io.github.xander_haj.Z3R.desktop AppDir/usr/share/applications/io.github.xander_haj.Z3R.desktop
        install -Dm644 packaging/appimage/io.github.xander_haj.Z3R.desktop AppDir/io.github.xander_haj.Z3R.desktop
        ln -sf usr/share/icons/hicolor/scalable/apps/io.github.xander_haj.Z3R.svg AppDir/io.github.xander_haj.Z3R.svg

        wget -q "${APPIMAGETOOL_URL}" -O appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        ./appimagetool-x86_64.AppImage --appimage-extract
        mv squashfs-root appimagetool-root
        ARCH=x86_64 ./appimagetool-root/AppRun AppDir dist/Z3R-linux-x64.AppImage
        chmod +x dist/Z3R-linux-x64.AppImage
        tar -czf dist/Z3R-linux-x64.AppImage.tar.gz -C dist Z3R-linux-x64.AppImage
    - name: Upload ${{ matrix.name }} artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ matrix.archive }}
        path: dist/${{ matrix.archive }}
        if-no-files-found: error
    - name: Upload Linux AppImage artifact
      if: ${{ matrix.platform == 'linux' }}
      uses: actions/upload-artifact@v6
      with:
        name: Z3R-linux-x64.AppImage.tar.gz
        path: dist/Z3R-linux-x64.AppImage.tar.gz
        if-no-files-found: error
    - name: Upload ${{ matrix.name }} release asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v3
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      with:
        token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        files: dist/${{ matrix.archive }}
        generate_release_notes: true
    - name: Upload Linux AppImage release asset
      if: ${{ matrix.platform == 'linux' && startsWith(github.ref, 'refs/tags/') }}
      uses: softprops/action-gh-release@v3
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      with:
        token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        files: |
          dist/Z3R-linux-x64.AppImage
          dist/Z3R-linux-x64.AppImage.tar.gz
        generate_release_notes: true

  build-windows:
    name: on Windows
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
    - name: Set up MSBuild
      uses: microsoft/setup-msbuild@v3
    - name: Restore NuGet packages
      run: nuget restore Zelda3.sln
    - name: Build Windows exe
      run: msbuild Zelda3.sln /m /p:Configuration=Release /p:Platform=x64
    - name: Package Windows build
      shell: pwsh
      run: |
        $packageDir = "dist/Z3R-windows-x64"
        New-Item -ItemType Directory -Force $packageDir | Out-Null
        Copy-Item "bin/x64-Release/zelda3.exe" $packageDir
        Copy-Item -Path "readme.md", "LICENSE.txt", "zelda3.ini" -Destination $packageDir

        $sdlDll = Get-ChildItem -Path "bin", "packages" -Recurse -Filter "SDL2.dll" |
          Where-Object { $_.FullName -match "x64" } |
          Select-Object -First 1
        if (-not $sdlDll) {
          throw "Could not find SDL2.dll after NuGet restore/build."
        }
        Copy-Item $sdlDll.FullName $packageDir

        Compress-Archive -Path "$packageDir/*" -DestinationPath "dist/Z3R-windows-x64.zip" -Force
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v6
      with:
        name: Z3R-windows-x64.zip
        path: dist/Z3R-windows-x64.zip
        if-no-files-found: error
    - name: Upload Windows release asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v3
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      with:
        token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        files: dist/Z3R-windows-x64.zip
        generate_release_notes: true

  build-flatpak:
    name: Flatpak for Linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
    - uses: actions/checkout@v6

    - name: Build and upload Flatpak bundle
      uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: Z3R-linux.flatpak
        manifest-path: packaging/flatpak/io.github.xander_haj.Z3R.yml
        branch: stable
        cache-key: flatpak-builder-${{ github.sha }}
        upload-artifact: true
    - name: Upload Flatpak release asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v3
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      with:
        token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        files: Z3R-linux.flatpak
        generate_release_notes: true
