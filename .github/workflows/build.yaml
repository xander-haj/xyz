name: Build

on:
  push:
    tags:
    - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-unix:
    name: on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: Linux
          platform: linux
          os: ubuntu-latest
          archive: Z3R-linux-x64.tar.gz
        - name: Mac Intel
          platform: macos
          os: macos-15-intel
          archive: Z3R-macos-intel.tar.gz
        - name: Mac Apple Silicon
          platform: macos
          os: macos-15
          archive: Z3R-macos-apple-silicon.tar.gz
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies for Linux
      if: ${{ matrix.platform == 'linux' }}
      run: |
        sudo apt update
        sudo apt install -y libsdl2-dev
    - name: Install dependencies for Mac
      if: ${{ matrix.platform == 'macos' }}
      run: |
        brew install sdl2
    - name: Build
      run: make -j$(getconf _NPROCESSORS_ONLN) zelda3
    - name: Package ${{ matrix.name }} build
      run: |
        mkdir -p "dist/Z3R-${{ matrix.name }}"
        cp zelda3 zelda3.ini README.md LICENSE.txt "dist/Z3R-${{ matrix.name }}/"
        tar -czf "dist/${{ matrix.archive }}" -C "dist/Z3R-${{ matrix.name }}" .
    - name: Upload ${{ matrix.name }} artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.archive }}
        path: dist/${{ matrix.archive }}
        if-no-files-found: error

  build-windows:
    name: on Windows
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up MSBuild
      uses: microsoft/setup-msbuild@v2
    - name: Restore NuGet packages
      run: nuget restore Zelda3.sln
    - name: Build Windows exe
      run: msbuild Zelda3.sln /m /p:Configuration=Release /p:Platform=x64
    - name: Package Windows build
      shell: pwsh
      run: |
        $packageDir = "dist/Z3R-windows-x64"
        New-Item -ItemType Directory -Force $packageDir | Out-Null
        Copy-Item "bin/x64-Release/zelda3.exe" $packageDir
        Copy-Item -Path "README.md", "LICENSE.txt", "zelda3.ini" -Destination $packageDir

        $sdlDll = Get-ChildItem -Path "bin", "packages" -Recurse -Filter "SDL2.dll" |
          Where-Object { $_.FullName -match "x64" } |
          Select-Object -First 1
        if (-not $sdlDll) {
          throw "Could not find SDL2.dll after NuGet restore/build."
        }
        Copy-Item $sdlDll.FullName $packageDir

        Compress-Archive -Path "$packageDir/*" -DestinationPath "dist/Z3R-windows-x64.zip" -Force
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: Z3R-windows-x64.zip
        path: dist/Z3R-windows-x64.zip
        if-no-files-found: error

  build-flatpak:
    name: Flatpak for Linux
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
    - uses: actions/checkout@v4

    - name: Build and upload Flatpak bundle
      uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: Z3R-linux.flatpak
        manifest-path: packaging/flatpak/io.github.xander_haj.Z3R.yml
        branch: stable
        cache-key: flatpak-builder-${{ github.sha }}
        upload-artifact: true

  publish-release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
    - build-unix
    - build-windows
    - build-flatpak
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets
    - name: Create or update GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
        TAG_NAME: ${{ github.ref_name }}
      run: |
        mapfile -t assets < <(find release-assets -type f | sort)
        if [ "${#assets[@]}" -eq 0 ]; then
          echo "No release assets were downloaded."
          exit 1
        fi

        if gh release view "$TAG_NAME" >/dev/null 2>&1; then
          gh release upload "$TAG_NAME" "${assets[@]}" --clobber
        else
          gh release create "$TAG_NAME" "${assets[@]}" --verify-tag --generate-notes
        fi
