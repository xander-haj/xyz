# =================================================================================
# zelda3.ini — Nintendo Switch runtime configuration for zelda3
#
# This INI file controls game behavior, graphics, audio, gameplay features, and
# key bindings for the Switch port. It is read at startup by config.c and applies
# settings that differ from the SNES original (e.g., widescreen, enhanced Mode 7).
#
# Switch-specific defaults: 1280x720 window (Switch native resolution), 16:9 aspect
# ratio (fills the Switch display), NoSpriteLimits enabled (the Switch CPU can handle
# more sprites per scanline than the original SNES hardware).
#
# Values are parsed as integers (0/1 for booleans) or strings. Lines starting with
# # are comments. Commented-out keys show alternative values for reference.
# =================================================================================

; ---------------------------------------------------------------------------------
; General settings: controls top-level application behavior such as save state
; persistence and performance monitoring. These settings are not gameplay-specific.
; ---------------------------------------------------------------------------------
[General]
# Automatically save state on quit and reload on start
Autosave = 0
# When enabled, shows frame rate and timing info in the window title bar
DisplayPerfInTitle = 0

# Extended aspect ratio, either 16:9, 16:10, or 18:9. 4:3 means normal aspect ratio.
# Add ", unchanged_sprites" to avoid changing sprite spawn/die behavior. Without this
# replays will be incompatible.
# Add ", no_visual_fixes" to avoid fixing some graphics glitches (for example with Cape).
# It won't affect replays/game behavior but the memory compare will not work.
# Add "extend_y, " right before the aspect radio specifier to display 240 lines instead of 224.
ExtendedAspectRatio = 16:9

# Fill overworld and dungeon widescreen side bars from nearby rendered edge art.
# Structured rooms repeat two tile columns; the Master Sword grove uses its editable tile table.
# House-style interiors keep their normal black side bars.
# Requires ExtendedAspectRatio to be enabled before it can take effect.
FillExtendedAspectRatioBorders = 0


; ---------------------------------------------------------------------------------
; Graphics settings: resolution, rendering mode, and visual enhancements.
; The Switch defaults target 1280x720 (native handheld resolution) with the
; OpenGL new renderer enabled to support widescreen and enhanced Mode 7.
; ---------------------------------------------------------------------------------
[Graphics]
# Window size ( Auto or WidthxHeight )
# Set to 1280x720 to match the Switch's native handheld display resolution
WindowSize = 1280x720
# Fullscreen mode (0=windowed, 1=desktop fullscreen, 2=fullscreen w/mode change)
Fullscreen = 0
# Window scale (1=100%, 2=200%, 3=300%, etc.)
WindowScale = 1
# Use the OpenGL shader-based renderer instead of the legacy software renderer.
# Required for EnhancedMode7 and widescreen rendering to function.
NewRenderer = 1
# Enable 4x upsampled Mode 7 rendering with perspective correction — eliminates
# the pixelated scaling visible in the original SNES hardware on floors/maps
EnhancedMode7 = 1
# When 0, maintain the configured aspect ratio with black bars if needed
IgnoreAspectRatio = 0

# Enable this option to remove the sprite limits per scan line
# The SNES PPU could only display 32 sprites per scanline — this restriction
# caused flickering in busy scenes. Enabled by default on Switch since the ARM
# CPU has no trouble rendering all sprites without the original hardware limit.
NoSpriteLimits = 1

# Change the appearance of Link by loading a ZSPR file
# See all sprites here: https://snesrev.github.io/sprites-gfx/snes/zelda3/link/
# Download the files with "git clone https://github.com/snesrev/sprites-gfx.git"
# LinkGraphics = sprites-gfx/snes/zelda3/link/sheets/megaman-x.2.zspr


; ---------------------------------------------------------------------------------
; Sound settings: audio output configuration and MSU-1 enhanced soundtrack.
; The audio pipeline sends SPC700 DSP output (or MSU-1 Opus streams) through
; SDL2's audio subsystem to the Switch hardware mixer.
; ---------------------------------------------------------------------------------
[Sound]
# Master audio toggle — set to 0 to completely disable sound output
EnableAudio = 1

# DSP frequency in samples per second (e.g. 48000, 44100, 32000, 22050, 11025)
# 44100 Hz is CD quality and required for MSU-1 audio pack compatibility
AudioFreq = 44100
# number of separate sound channels (1=mono, 2=stereo)
AudioChannels = 2
# Audio buffer size in samples (power of 2; e.g., 4096, 2048, 1024) [try 1024 if sound is crackly]. The higher the more lag before you hear sounds.
# 1024 samples at 44100 Hz = ~23ms latency, a good balance for the Switch's audio pipeline
AudioSamples = 1024

# Enable MSU support for audio. Files need to be in a subfolder, msu/alttp_msu-*.pcm
# Only works with 44100 hz and 2 channels
# MSU-1 replaces the SPC700 soundtrack with high-quality Opus-decoded audio tracks
EnableMSU = 0


; ---------------------------------------------------------------------------------
; Feature flags: quality-of-life improvements and bug fixes that go beyond
; the original SNES ROM behavior. All default to 0 (disabled) so that a
; vanilla playthrough matches the original 1991 release. Enable selectively
; for a modernized experience. Some features affect replay compatibility.
; ---------------------------------------------------------------------------------
[Features]
# Quality-of-life enhancements and bug fixes not present in the original SNES release.
# All default to 0 (disabled) to preserve authentic gameplay by default.
# Each feature is implemented in the C reimplementation and gated by these flags
# via the features.h configuration system.

# Item switch on L/R. Also allows reordering of items in inventory by pressing Y+direction
# Hold X inside of the item selection screen to reassign the X key into a separate item slot.
# When X is assigned to an item, the Select key is used to enter the map. Press Select inside
# of the Start menu to see the old select options.
ItemSwitchLR = 0

# Allow turning while dashing
# In the original, dashing with the Pegasus Boots locks Link's direction until collision
TurnWhileDashing = 0

# Allow mirror to be used to warp to the Dark World
# Originally, the Magic Mirror only warps Light World -> Dark World via specific tiles
MirrorToDarkworld = 0

# Collect items (like hearts) with sword instead of having to touch them
# Adds a hitbox to the sword swing that triggers item pickup on contact
CollectItemsWithSword = 0

# Level 2-4 sword can be used to break pots
# In the original, only lifting and throwing breaks pots; this enables sword strikes
BreakPotsWithSword = 0

# Disable the low health beep
# Silences the repeating alarm tone when Link has low hearts
DisableLowHealthBeep = 0

# Re-arrange the top in-game HUD when ExtendedAspectRatio is active.
# Positions are tile coordinates in the widescreen viewport: X,Y.
# Half-tile decimals are supported, for example 38.5,2.
# For 16:9, useful X values are roughly 0-49 and Y values are 0-29.
RearrangeHUD = 0

# Magic meter, matching Hud_Rebuild() frame tiles and Hud_Update_Magic() fill tiles.
HUDMagicFramePosition = 0,0
HUDMagicMeterPosition = 0,0

# Equipped item box, matching Hud_Rebuild() frame tiles and Hud_UpdateItemBox() icon tiles.
HUDItemBoxPosition = 5,0
HUDItemIconPosition = 6,1
HUDItemXBoxPosition = 9,0
HUDItemXIconPosition = 10,1
HUDItemLBoxPosition = 13,0
HUDItemLIconPosition = 14,1
HUDItemRBoxPosition = 17,0
HUDItemRIconPosition = 18,1

# Inventory counters, matching Hud_Update_Inventory().
HUDCounterBackdropPosition = 15,0
HUDRupeesPosition = 16,1
HUDBombsPosition = 20,1
HUDArrowsPosition = 23,1
HUDKeysPosition = 26,1

# Hearts, matching Hud_Rebuild() heart backdrop and Hud_Update_Hearts() heart icons.
HUDHeartsFramePosition = 29,0
HUDHeartMeterPosition = 29,1

# Avoid waiting too much at the start
# Allows skipping the Nintendo/intro screens with any button press
SkipIntroOnKeypress = 0

# Display max rupees/bombs/arrows with orange/yellow color
# Provides visual feedback when the player has reached carrying capacity
ShowMaxItemsInYellow = 0

# Allows up to four bombs active at a time instead of two.
# The original SNES limited active bombs to 2 due to sprite/ancilla slot constraints
MoreActiveBombs = 0

# Can carry 9999 rupees instead of 999
# Raises the rupee cap from the original 3-digit display limit
CarryMoreRupees = 0

# Enable various zelda bug fixes
# Fixes minor visual glitches and edge cases that existed in the original ROM
MiscBugFixes = 0

# Enable some more advanced zelda bugfixes that change game behavior
# These fixes alter gameplay logic and may affect replay compatibility
GameChangingBugFixes = 0

# Allow bird travel to be cancelled by hitting the X key
# In the original, once you select a bird destination you cannot cancel
CancelBirdTravel = 0

# Press the configured NewSettingsMenu key/button to open a blank settings menu.
NewSettingsMenu = 1


; ---------------------------------------------------------------------------------
; Key mapping: keyboard-to-SNES-joypad bindings, debug/cheat keys, save state
; shortcuts, and replay controls. On Switch hardware, physical controller buttons
; are handled by SDL2's game controller API; these mappings apply when a USB
; keyboard is attached or when testing the build on a desktop environment.
; ---------------------------------------------------------------------------------
[KeyMap]
# Input mapping configuration. On Switch, physical controller buttons are mapped
# through SDL2's game controller API, but these keyboard mappings still apply when
# a USB keyboard is connected or when running under a desktop environment for testing.

# Change what keyboard keys map to the joypad
# Order: Up, Down, Left, Right, Select, Start, A, B, X, Y, L, R

# This default is suitable for QWERTY keyboards.
Controls = Up, Down, Left, Right, Right Shift, Return, x, z, s, a, c, v

# This default is suitable for QWERTZ keyboards.
#Controls = Up, Down, Left, Right, Right Shift, Return, x, y, s, a, c, v

# This one is suitable for AZERTY keyboards.
#Controls = Up, Down, Left, Right, Right Shift, Return, x, w, s, q, c, v

# Debug and cheat key bindings — primarily useful during development
CheatLife = w
CheatKeys = o
CheatWalkThroughWalls = Ctrl+e

# Replay system controls — the game can record and play back input sequences
# for deterministic replay, useful for testing and TAS (tool-assisted speedruns)
ClearKeyLog = k
StopReplay = l

# Display and execution control
Fullscreen = Alt+Return
Reset = Ctrl+r
Pause = Shift+p
# PauseDimmed pauses and dims the screen — useful for stepping away briefly
PauseDimmed = p
# Turbo removes frame rate limiting for fast-forwarding through cutscenes/dialogue
Turbo = Tab
ReplayTurbo = t
WindowBigger = Ctrl+Up
WindowSmaller = Ctrl+Down
NewSettingsMenu =

# Save state slots: F1-F10 for quick load, Shift+F1-F10 for quick save
# Each slot stores a complete snapshot of SNES WRAM, VRAM, registers, and SPC state
Load =      F1,     F2,     F3,     F4,     F5,     F6,     F7,     F8,     F9,     F10
Save = Shift+F1,Shift+F2,Shift+F3,Shift+F4,Shift+F5,Shift+F6,Shift+F7,Shift+F8,Shift+F9,Shift+F10
# Replay recording slots: Ctrl+F1-F10 start recording/playing back input for that slot
Replay= Ctrl+F1,Ctrl+F2,Ctrl+F3,Ctrl+F4,Ctrl+F5,Ctrl+F6,Ctrl+F7,Ctrl+F8,Ctrl+F9,Ctrl+F10

# Reference save/replay slots using number keys — alternative bindings for quick access
LoadRef = 1,2,3,4,5,6,7,8,9,0,-,=,Backspace
ReplayRef = Ctrl+1,Ctrl+2,Ctrl+3,Ctrl+4,Ctrl+5,Ctrl+6,Ctrl+7,Ctrl+8,Ctrl+9,Ctrl+0,Ctrl+-,Ctrl+=,Ctrl+Backspace

[GamepadMap]
# Any keys used in KeyMap can be used also in this section.
# The shoulder button is called L1/Lb and L2, and the thumbstick button is called L3
Controls = DpadUp, DpadDown, DpadLeft, DpadRight, Back, Start, B, A, Y, X, Lb, Rb
NewSettingsMenu = L2
