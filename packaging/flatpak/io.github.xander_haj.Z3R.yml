id: io.github.xander_haj.Z3R
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: z3r

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --device=input

cleanup:
  - /include
  - /lib/pkgconfig
  - '*.a'

modules:
  - name: z3r
    buildsystem: simple
    build-commands:
      - make -j${FLATPAK_BUILDER_N_JOBS} zelda3
      - install -Dm755 zelda3 /app/bin/zelda3.real
      - install -Dm755 packaging/flatpak/io.github.xander_haj.Z3R /app/bin/z3r
      - install -Dm644 zelda3.ini /app/share/Z3R/zelda3.ini
      - install -Dm644 README.md /app/share/doc/Z3R/README.md
      - install -Dm644 LICENSE.txt /app/share/licenses/Z3R/LICENSE.txt
      - install -Dm644 packaging/flatpak/io.github.xander_haj.Z3R.desktop /app/share/applications/io.github.xander_haj.Z3R.desktop
      - install -Dm644 packaging/flatpak/io.github.xander_haj.Z3R.metainfo.xml /app/share/metainfo/io.github.xander_haj.Z3R.metainfo.xml
      - install -Dm644 packaging/flatpak/io.github.xander_haj.Z3R.svg /app/share/icons/hicolor/scalable/apps/io.github.xander_haj.Z3R.svg
    sources:
      - type: dir
        path: ../..
